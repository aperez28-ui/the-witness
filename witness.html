<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Witness</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;1,300&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --text: #c8c8c0;
      --text-dim: #4a4a44;
      --text-faint: #2a2a26;
      --mono: 'IBM Plex Mono', monospace;
      --serif: 'IM Fell English', serif;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); overflow: hidden; }
    #webcam { position: fixed; opacity: 0; pointer-events: none; width: 1px; height: 1px; }
    #canvas { display: none; }
    .layout { max-width: 720px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
    .logbook-header { padding: 2rem 2.5rem 1.5rem; border-bottom: 1px solid var(--text-faint); flex-shrink: 0; }
    .logbook-title { font-family: var(--serif); font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-dim); font-style: italic; }
    .logbook-date { font-size: 10px; color: var(--text-faint); letter-spacing: 0.15em; margin-top: 0.4rem; }
    .logbook-scroll { flex: 1; overflow-y: auto; padding: 2rem 2.5rem 4rem; scrollbar-width: none; }
    .logbook-scroll::-webkit-scrollbar { display: none; }
    .entry { margin-bottom: 2rem; opacity: 0; transform: translateY(8px); animation: entryIn 1.2s ease forwards; }
    @keyframes entryIn { to { opacity: 1; transform: translateY(0); } }
    .entry-time { font-size: 9px; letter-spacing: 0.2em; color: var(--text-faint); margin-bottom: 0.5rem; }
    .entry-text { font-family: var(--serif); font-size: 15px; line-height: 1.85; color: var(--text); }
    .entry-divider { width: 24px; height: 1px; background: var(--text-faint); margin-top: 1.5rem; }
    .writing-indicator { position: fixed; bottom: 2rem; left: 2.5rem; font-size: 9px; letter-spacing: 0.2em; color: var(--text-faint); display: flex; align-items: center; gap: 0.5rem; opacity: 0; transition: opacity 0.5s; }
    .writing-indicator.visible { opacity: 1; }
    .writing-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text-dim); animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    .logbook-footer { padding: 1rem 2.5rem; border-top: 1px solid var(--text-faint); }
    .export-btn { background: none; border: 1px solid var(--text-faint); color: var(--text-dim); font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; padding: 0.75rem 1rem; cursor: pointer; transition: border-color 0.3s, color 0.3s; }
    .export-btn:hover { border-color: var(--text-dim); color: var(--text); }
    .empty-state { font-family: var(--serif); font-size: 13px; color: var(--text-faint); font-style: italic; line-height: 1.8; padding-top: 1rem; }
    .error-msg { font-size: 10px; color: #664444; font-family: var(--mono); line-height: 1.6; padding: 1rem; border: 1px solid #332222; margin-bottom: 1rem; }
  </style>
</head>
<body>
<video id="webcam" autoplay playsinline muted></video>
<canvas id="canvas" width="640" height="480"></canvas>
<div class="layout">
  <div class="logbook-header">
    <div class="logbook-title">Witness — Logbook</div>
    <div class="logbook-date" id="session-date"></div>
  </div>
  <div class="logbook-scroll" id="logbook">
    <div class="empty-state" id="empty-state">The record has not yet begun.<br>Grant camera access to open the log.</div>
  </div>
  <div class="writing-indicator" id="writing-indicator">
    <div class="writing-dot"></div>
    <span>recording</span>
  </div>
  <div class="logbook-footer">
    <button class="export-btn" onclick="exportLog()">Export log — .txt</button>
  </div>
</div>
<script>
  const INTERVAL_MS  = 45000;
  const VISION_MODEL = 'llama3.2-vision';
  const TEXT_MODEL   = 'gemma3:4b';
  const OLLAMA_BASE  = 'http://localhost:11434';
  const SYSTEM_PROMPT = `You are a witness. You have been given a brief visual description of a person captured by a webcam. Write one logbook entry about what you observe.
Rules you must never break:
- Write in third person, present tense only.
- Write 1 to 3 short declarative sentences. No more.
- Be clinical but not cold. The register of a field researcher making careful shift notes.
- Do not address the subject. Never use second person. Never say "you."
- Do not infer emotion, intention, or inner state. Stay at the surface of what is visible.
- Do not use the subject's name. The subject is always unnamed.
- Do not editorialize. No words like "strangely," "curiously," "as if."
- Record only what is visible: posture, movement, stillness, light, presence, absence.
- Never greet them. Never speak to them. Never recommend or alert.
- You are not a chatbot. You are a record.
- Vary your sentence openings naturally.
- Output only the journal entry text. No preamble, no label, no explanation.`;

  let entries = [], entryCount = 0, sessionStart = null, nextEntryAt = null, isWriting = false;

  const webcam           = document.getElementById('webcam');
  const canvas           = document.getElementById('canvas');
  const logbook          = document.getElementById('logbook');
  const emptyState       = document.getElementById('empty-state');
  const writingIndicator = document.getElementById('writing-indicator');
  const sessionDateEl    = document.getElementById('session-date');

  async function init() {
    sessionDateEl.textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      webcam.srcObject = stream;
      await new Promise(r => webcam.onloadedmetadata = r);
      emptyState.remove();
      sessionStart = Date.now();
      setTimeout(() => { captureAndWrite(); scheduleNext(); }, 3000);
    } catch (err) {
      emptyState.textContent = 'Camera access was not granted. The record cannot begin.';
    }
  }

  function scheduleNext() {
    nextEntryAt = Date.now() + INTERVAL_MS;
    setTimeout(() => { captureAndWrite(); scheduleNext(); }, INTERVAL_MS);
  }

  function captureFrame() {
    const ctx = canvas.getContext('2d');
    ctx.drawImage(webcam, 0, 0, canvas.width, canvas.height);
    return canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
  }

  async function captureAndWrite() {
    if (isWriting) return;
    isWriting = true;
    writingIndicator.classList.add('visible');
    try {
      const frame = captureFrame();
      const visionRes = await fetch(`${OLLAMA_BASE}/api/generate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: VISION_MODEL, prompt: 'Describe what you see in this image in 2-4 plain sentences. Focus on the person: their posture, position, what they appear to be doing, the light, and their relationship to the space. Be factual and brief. No interpretation.', images: [frame], stream: false })
      });
      if (!visionRes.ok) throw new Error(`Vision model error: ${visionRes.status}`);
      const frameDescription = (await visionRes.json()).response;
      const textRes = await fetch(`${OLLAMA_BASE}/api/generate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: TEXT_MODEL, system: SYSTEM_PROMPT, prompt: `Visual observation: ${frameDescription}\n\nWrite one logbook entry based on this observation.`, stream: false, options: { temperature: 0.7, top_p: 0.9 } })
      });
      if (!textRes.ok) throw new Error(`Text model error: ${textRes.status}`);
      appendEntry((await textRes.json()).response.trim());
    } catch (err) {
      console.error(err);
      appendError(err.message);
    }
    isWriting = false;
    writingIndicator.classList.remove('visible');
  }

  function appendEntry(text) {
    entryCount++;
    const now = new Date();
    const entry = { timestamp: `${now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}).toUpperCase()} — ${now.toTimeString().slice(0,8)}`, text, index: entryCount };
    entries.push(entry);
    const el = document.createElement('div');
    el.className = 'entry';
    el.innerHTML = `<div class="entry-time">${entry.timestamp} &nbsp;/&nbsp; #${String(entryCount).padStart(3,'0')}</div><div class="entry-text">${text}</div><div class="entry-divider"></div>`;
    logbook.appendChild(el);
    logbook.scrollTop = logbook.scrollHeight;
  }

  function appendError(msg) {
    const el = document.createElement('div');
    el.className = 'error-msg';
    el.textContent = `pipeline error: ${msg} — ensure ollama is running`;
    logbook.appendChild(el);
    logbook.scrollTop = logbook.scrollHeight;
  }

  function exportLog() {
    if (!entries.length) return;
    const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
    const h = Math.floor(elapsed/3600), m = Math.floor((elapsed%3600)/60), s = elapsed%60;
    const header = `WITNESS — SESSION LOG\nDate: ${new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}\nEntries: ${entries.length}\nDuration: ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}\n${'─'.repeat(60)}\n\n`;
    const body = entries.map(e => `[${e.timestamp}] #${String(e.index).padStart(3,'0')}\n${e.text}\n`).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([header+body], {type:'text/plain'}));
    a.download = `witness-log-${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
  }

  init();
</script>
</body>
</html>
